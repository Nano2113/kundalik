<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>School Journal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>

  <template id="tpl-login">
    <div class="page center">
      <div class="card login">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <div class="title">Электронный журнал</div>
            <div class="subtitle">Вход для учителей и администратора</div>
          </div>
        </div>

        <form id="loginForm" class="stack">
          <label class="field">
            <span>Логин</span>
            <input name="login" autocomplete="username" required />
          </label>

          <label class="field">
            <span>Пароль</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>

          <button class="btn primary" type="submit">Войти</button>
          <div class="hint">
            Данные сохраняются на сервере (SQLite).
          </div>
        </form>
      </div>
    </div>
  </template>

  <template id="tpl-shell">
    <div class="shell">
      <header class="topbar">
        <div class="left">
          <div class="chip" id="userChip"></div>
          <div class="sep"></div>

          <label class="topfield">
            <span>Класс</span>
            <select id="classSelect"></select>
          </label>

          <label class="topfield" id="subjectField">
            <span>Предмет</span>
            <select id="subjectSelect"></select>
          </label>
        </div>

        <div class="right">
          <button class="btn" id="btnAdmin" style="display:none">Админ-панель</button>
          <button class="btn" id="btnLogout">Выйти</button>
        </div>
      </header>

      <main class="content">
        <div class="toolbar">
          <div class="monthNav">
            <button class="btn" id="btnPrevMonth" title="Предыдущий месяц">◀</button>
            <div class="monthTitle" id="monthTitle"></div>
            <button class="btn" id="btnNextMonth" title="Следующий месяц">▶</button>
          </div>

          <div class="toolbarRight">
            <button class="btn" id="btnAddStudent" style="display:none">+ Добавить ученика</button>
          </div>
        </div>

        <section class="card">
          <div class="tableWrap">
            <table class="gradebook" id="gradeTable"></table>
          </div>
          <div class="foot">
            <div class="legend">
              <span class="tag">1–10</span> оценка
              <span class="tag">П</span> пропуск
              <span class="tag">О</span> опоздал
              <span class="tag">Н</span> пропуск
            </div>
            <div class="footNote" id="lockNote"></div>
          </div>
        </section>

        <section class="card" id="topicCard" style="display:none">
          <div class="topicHead">
            <div>
              <div class="h2">Тема урока • <span class="muted" id="topicDateLabel"></span></div>
              <div class="muted">Появляется после выбора дня (клик по дню или ячейке).</div>
            </div>
            <div style="display:flex; gap:8px; align-items:center">
              <button class="btn" id="btnEditTopic" type="button">Изменить</button>
              <button class="btn primary" id="btnSaveTopic" type="button">Сохранить</button>
            </div>
          </div>

          <div id="topicView" class="topicView" style="display:none"></div>

          <div id="topicEdit">
            <textarea id="topicText" rows="3" placeholder="Например: Дроби. Сложение и вычитание"></textarea>
          </div>
        </section>

        <section class="card" id="auditCard" style="display:none">
          <div class="topicHead">
            <div>
              <div class="h2">Журнал изменений (последние)</div>
              <div class="muted">Показывает изменения оценок с комментариями.</div>
            </div>
          </div>
          <div class="auditList" id="auditList" style="padding:0 12px 12px 12px"></div>
        </section>
      </main>

      <div class="modal" id="modal" aria-hidden="true">
        <div class="modalCard">
          <div class="modalTitle" id="modalTitle"></div>
          <div class="modalBody" id="modalBody"></div>
          <div class="modalActions" id="modalActions"></div>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-admin">
    <div class="adminPage">
      <div class="adminGrid">
        <section class="card" style="padding:12px">
          <div class="h2">Классы</div>
          <div class="muted">Создавайте новые классы — они появятся у всех.</div>

          <form id="classForm" class="row">
            <input name="className" placeholder="Например: 7-А" required />
            <button class="btn primary" type="submit">Добавить</button>
          </form>

          <div class="list" id="classList"></div>
        </section>

        <section class="card" id="studentsBox" style="padding:12px">
          <div class="h2">Ученики (текущий класс)</div>
          <div class="muted">Только админ может добавлять/удалять учеников.</div>
          <div class="list" id="studentsList"></div>
        </section>

        <section class="card" style="padding:12px">
          <div class="h2">Черный список</div>
          <div class="muted">Ученики с пропусками П/Н &gt; 2. Учителям редактирование запрещено.</div>
          <div class="list" id="blackList"></div>
        </section>

        <section class="card" style="padding:12px">
          <div class="h2">Пользователи</div>
          <div class="muted">Пользователи лежат в базе данных, сидятся при первом запуске. Можно менять через SQL.</div>
          <div class="mono small" id="userList"></div>
        </section>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
